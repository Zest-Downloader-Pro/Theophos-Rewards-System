<script>
    // ... (Keep your Firebase Config here) ...

    let currentUser = null;
    let timerActive = false;
    let points = 0;
    let dailyCount = 0; 
    let currentPickedVideo = null; // Added this to track the active video

    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            document.getElementById('login-section').style.display = "none";
            
            const today = new Date().toISOString().split('T')[0];
            db.ref('users/' + user.uid).on('value', (snap) => {
                const data = snap.val() || {};
                points = data.points || 0;
                dailyCount = (data.daily_stats && data.daily_stats[today]) ? data.daily_stats[today] : 0;
                
                document.getElementById('user-greet').innerText = 
                    `Shalom, ${user.displayName} | Energy: ${points}pts | Today: ${dailyCount}/5`;
                
                checkUploadEligibility();
            });
            loadVideoTask();
        }
    });

    function checkUploadEligibility() {
        const submitBtn = document.getElementById('submitBtn');
        if (points >= 20 && dailyCount >= 2) { 
            submitBtn.disabled = false;
            submitBtn.style.opacity = "1";
            submitBtn.innerText = "ADD MY LINK (20pts)";
        } else {
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.5";
            submitBtn.innerText = `Need 20pts & 2 daily supports (Current: ${dailyCount}/2)`;
        }
    }

    async function loadVideoTask() {
        if (dailyCount >= 5) {
            document.getElementById('video-area').innerHTML = "<h3>Daily Limit Reached!</h3><p>To protect the community, you can only support 5 leaders per day.</p>";
            return;
        }

        const userRef = db.ref('user_activity/' + currentUser.uid);
        const userHistorySnap = await userRef.once('value');
        const userHistory = userHistorySnap.val() || {};

        db.ref('videos').once('value').then((snapshot) => {
            let videos = [];
            snapshot.forEach(child => { 
                if (!userHistory[child.key]) videos.push({ key: child.key, ...child.val() }); 
            });

            if (videos.length > 0) {
                currentPickedVideo = videos[Math.floor(Math.random() * videos.length)];
                
                document.getElementById('video-area').innerHTML = `
                    <iframe id="yt-player" src="https://www.youtube.com/embed/${currentPickedVideo.id}?rel=0" allowfullscreen></iframe>
                    <div style="margin-top:10px;">
                        <button class="btn" style="background:#cc0000; color:white;" 
                            onclick="verifyAndStart('${currentPickedVideo.id}', '${currentPickedVideo.key}')">
                            STEP 1: SUB & COMMENT ON YOUTUBE
                        </button>
                    </div>
                `;
            }
        });
    }

    function verifyAndStart(videoId, videoKey) {
        window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
        
        if (!timerActive) {
            timerActive = true;
            let time = 120;
            const tDiv = document.getElementById('timer');
            tDiv.style.display = "block"; // Ensure timer is visible
            
            const interval = setInterval(() => {
                if (timerActive) {
                    time--;
                    tDiv.innerText = time + "s";
                    if (time <= 0) {
                        clearInterval(interval);
                        timerActive = false;
                        completeTask(videoKey);
                    }
                }
            }, 1000);
        }
    }

    function completeTask(videoKey) {
        const today = new Date().toISOString().split('T')[0];
        
        // 1. Give Points & Update Stats
        db.ref('users/' + currentUser.uid + '/points').transaction(p => (p || 0) + 10);
        db.ref('users/' + currentUser.uid + '/daily_stats/' + today).transaction(c => (c || 0) + 1);
        db.ref('user_activity/' + currentUser.uid + '/' + videoKey).set(true);
        
        // 2. Clear current UI elements to make room for Bonus
        document.getElementById('timer').style.display = "none";

        // 3. INJECT THE VIRAL BONUS (This is where your code goes)
        const bonusArea = document.createElement('div');
        bonusArea.id = "bonus-container";
        bonusArea.innerHTML = `
            <div style="margin-top:20px; border-top:1px solid #333; padding-top:15px; background:#111; padding:10px; border-radius:10px;">
                <p style="color:#FFD700; font-size:0.85rem; font-weight:bold;">🔥 BINGE BONUS UNLOCKED</p>
                <p style="color:#888; font-size:0.75rem; margin-bottom:10px;">Watch a second video from <b>${currentPickedVideo.creator}</b> to help them go viral!</p>
                <button class="btn" style="display:block; background:#FF0000; color:white; border:none;" 
                    onclick="window.open('https://www.youtube.com/results?search_query=${currentPickedVideo.creator}', '_blank')">
                    GO TO CHANNEL
                </button>
                <button class="btn" style="background:transparent; color:#555; font-size:0.7rem; margin-top:10px;" onclick="location.reload()">Next Task</button>
            </div>
        `;
        document.getElementById('video-area').appendChild(bonusArea);
        
        alert("Success! +10 Points Added. Help this leader one last time!");
    }
</script>
