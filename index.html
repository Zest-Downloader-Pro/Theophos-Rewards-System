<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theophos Viral Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #FFD700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        #user-greet { color: #FFD700; font-weight: bold; margin-bottom: 20px; font-size: 0.9rem; background: #222; padding: 10px; border-radius: 10px; }
        #video-area iframe { width: 100%; height: 250px; border-radius: 12px; border: 2px solid #333; margin-top: 15px; }
        .btn { background: #FFD700; color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; font-size: 1rem; transition: 0.3s; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        #timer { font-size: 3rem; font-weight: bold; color: #FFD700; margin: 20px 0; display: none; }
        .bonus-box { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #FFD700; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Theophos Hub</h2>
    <div id="user-greet" style="display:none;"></div>
    
    <div id="login-section">
        <p style="color: #888;">Join the community of leaders.</p>
        <button id="loginBtn" class="btn">LOGIN WITH GOOGLE</button>
    </div>

    <div id="task-section" style="display:none;">
        <div id="video-area"></div>
        <div id="timer">120s</div>
    </div>

    <button id="submitBtn" class="btn" style="display:none; background: #fff;" onclick="window.location.href='submit.html'">ADD MY LINK (20pts)</button>
</div>

<script>
    // 1. CONFIGURATION
    const firebaseConfig = {
      apiKey: "AIzaSyDphx9VNL7zycGOofDyDyY688pggYl4mns",
      authDomain: "theophos-rewards-system.firebaseapp.com",
      databaseURL: "https://theophos-rewards-system-default-rtdb.firebaseio.com",
      projectId: "theophos-rewards-system",
      appId: "1:669378222:web:4a295fab14a09ff3662f3f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let currentUser = null;
    let timerActive = false;
    let points = 0;
    let dailyCount = 0;
    let currentPickedVideo = null;

    // 2. AUTHENTICATION
    document.getElementById('loginBtn').onclick = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(err => alert("Error: " + err.message));
    };

    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            document.getElementById('login-section').style.display = "none";
            document.getElementById('user-greet').style.display = "block";
            
            const today = new Date().toISOString().split('T')[0];
            db.ref('users/' + user.uid).on('value', (snap) => {
                const data = snap.val() || {};
                points = data.points || 0;
                dailyCount = (data.daily_stats && data.daily_stats[today]) ? data.daily_stats[today] : 0;
                
                document.getElementById('user-greet').innerText = 
                    `Shalom, ${user.displayName} | Energy: ${points}pts | Today: ${dailyCount}/10`;
                
                checkUploadEligibility();
            });
            loadVideoTask();
        }
    });

    // 3. ELIGIBILITY CHECK
    function checkUploadEligibility() {
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.style.display = "block";
        if (points >= 20 && dailyCount >= 2) { 
            submitBtn.disabled = false;
            submitBtn.style.opacity = "1";
            submitBtn.innerText = "ADD MY LINK (20pts)";
        } else {
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.5";
            submitBtn.innerText = `Need 20pts & 2 supports (${dailyCount}/2)`;
        }
    }

    // 4. LOAD VIDEO
    async function loadVideoTask() {
        if (dailyCount >= 10) {
            document.getElementById('video-area').innerHTML = "<h3>Daily Limit Reached!</h3><p>You've supported 10 leaders today. Come back tomorrow!</p>";
            return;
        }

        const userRef = db.ref('user_activity/' + currentUser.uid);
        const userHistorySnap = await userRef.once('value');
        const userHistory = userHistorySnap.val() || {};

        db.ref('videos').once('value').then((snapshot) => {
            let videos = [];
            snapshot.forEach(child => { 
                if (!userHistory[child.key]) videos.push({ key: child.key, ...child.val() }); 
            });

            if (videos.length > 0) {
                currentPickedVideo = videos[Math.floor(Math.random() * videos.length)];
                document.getElementById('task-section').style.display = "block";
                document.getElementById('video-area').innerHTML = `
                    <iframe src="https://www.youtube.com/embed/${currentPickedVideo.id}?rel=0" allowfullscreen></iframe>
                    <button class="btn" style="background:#cc0000; color:white;" 
                        onclick="verifyAndStart('${currentPickedVideo.id}', '${currentPickedVideo.key}')">
                        STEP 1: WATCH & SUB (+5pts)
                    </button>
                `;
            } else {
                document.getElementById('video-area').innerHTML = "<p>No new videos. Check back later!</p>";
            }
        });
    }

    // 5. TIMER LOGIC
    function verifyAndStart(videoId, videoKey) {
        window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
        
        if (!timerActive) {
            timerActive = true;
            let time = 120;
            const tDiv = document.getElementById('timer');
            tDiv.style.display = "block";
            
            const interval = setInterval(() => {
                if (timerActive) {
                    time--;
                    tDiv.innerText = time + "s";
                    if (time <= 0) {
                        clearInterval(interval);
                        timerActive = false;
                        completeTask(videoKey);
                    }
                }
            }, 1000);
        }
    }

    // 6. REWARD LOGIC
    function completeTask(videoKey) {
        const today = new Date().toISOString().split('T')[0];
        
        // Give initial 5 points
        db.ref('users/' + currentUser.uid + '/points').transaction(p => (p || 0) + 5);
        db.ref('users/' + currentUser.uid + '/daily_stats/' + today).transaction(c => (c || 0) + 1);
        db.ref('user_activity/' + currentUser.uid + '/' + videoKey).set(true);
        
        document.getElementById('timer').style.display = "none";
        
        // Inject Binge Bonus
        document.getElementById('video-area').innerHTML = `
            <div class="bonus-box">
                <h3 style="color:#FFD700;">🔥 STEP 1 COMPLETE!</h3>
                <p>Support <b>${currentPickedVideo.creator}</b> more to get your <b>+15pts Bonus</b>!</p>
                <button class="btn" onclick="claimBonus()">STEP 2: GO TO CHANNEL (+15pts)</button>
            </div>
        `;
    }

    function claimBonus() {
        db.ref('users/' + currentUser.uid + '/points').transaction(p => (p || 0) + 15);
        window.open(`https://www.youtube.com/results?search_query=${currentPickedVideo.creator}`, '_blank');
        alert("Bonus added! Loading next leader...");
        location.reload();
    }
</script>

</body>
</html>
