<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDphx9VNL7zycGOofDyDyY688pggYl4mns",
      authDomain: "theophos-rewards-system.firebaseapp.com",
      databaseURL: "https://theophos-rewards-system-default-rtdb.firebaseio.com",
      projectId: "theophos-rewards-system",
      appId: "1:669378222:web:4a295fab14a09ff3662f3f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const commentPrompts = [
        "What was the most helpful part of this video?",
        "Give the creator one tip to improve their lighting or sound.",
        "Ask a question about something you didn't understand.",
        "Which specific tip in this video will you try first?"
    ];

    let timerActive = true;
    let currentUser = null;
    let currentPickedVideo = null; // Stores the video data for the Viral Bonus

    // --- GOOGLE LOGIN ---
    document.getElementById('loginBtn').onclick = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider);
    };

    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            document.getElementById('loginBtn').style.display = "none";
            document.getElementById('user-greet').innerText = "Shalom, " + user.displayName;
            document.getElementById('user-greet').style.display = "block";
            loadVideoTask();
        }
    });

    // --- 1. THE DRIP-FEED LOADER (SMART CHECK) ---
    async function loadVideoTask() {
        const userRef = db.ref('user_activity/' + currentUser.uid);
        const userHistorySnap = await userRef.once('value');
        const userHistory = userHistorySnap.val() || {};

        db.ref('videos').once('value').then((snapshot) => {
            let videos = [];
            snapshot.forEach(child => { 
                const videoKey = child.key;
                // Skip if user already supported this specific entry
                if (!userHistory[videoKey]) {
                    videos.push({ key: videoKey, ...child.val() }); 
                }
            });

            if (videos.length > 0) {
                currentPickedVideo = videos[Math.floor(Math.random() * videos.length)];
                
                let videoId = currentPickedVideo.id;
                if (videoId.includes('shorts/')) videoId = videoId.split('shorts/')[1].split('?')[0];
                else if (videoId.includes('v=')) videoId = videoId.split('v=')[1].split('&')[0];
                else if (videoId.includes('youtu.be/')) videoId = videoId.split('be/')[1].split('?')[0];

                document.getElementById('video-area').innerHTML = `
                    <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&rel=0" 
                            allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
                
                document.getElementById('prompt-container').style.display = "block";
                document.getElementById('comment-prompt').innerText = commentPrompts[Math.floor(Math.random() * commentPrompts.length)];
                
                startTimer(currentPickedVideo.key);
            } else {
                document.getElementById('video-area').innerHTML = `
                    <div style='padding:40px;'>
                        <h3>Mission Accomplished!</h3>
                        <p>You've supported everyone for now. Add your link or check back later!</p>
                    </div>`;
                document.getElementById('submitBtn').style.display = "block";
                document.getElementById('timer').style.display = "none";
            }
            renderLeaderboard(videos);
        });
    }

    // --- 2. THE WATCHDOG TIMER & VIRAL BONUS ---
    function startTimer(videoKey) {
        let time = 120;
        const timerDiv = document.getElementById('timer');
        const btn = document.getElementById('submitBtn');

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                timerActive = false;
                timerDiv.style.color = "red";
                timerDiv.innerText = "PAUSED";
            } else {
                timerActive = true;
                timerDiv.style.color = "#FFD700";
            }
        });

        const interval = setInterval(() => {
            if (timerActive) {
                time--;
                timerDiv.innerText = time + "s";
                if (time <= 0) {
                    clearInterval(interval);
                    timerDiv.style.display = "none";
                    btn.style.display = "block";

                    // Update View count in Database
                    db.ref('videos/' + videoKey + '/views').transaction(c => (c || 0) + 1);
                    
                    // Record activity so they don't see this video again
                    db.ref('user_activity/' + currentUser.uid + '/' + videoKey).set(true);

                    // --- THE VIRAL BONUS INJECTION ---
                    const bonusArea = document.createElement('div');
                    bonusArea.innerHTML = `
                        <div style="margin-top:20px; border-top:1px solid #333; padding-top:15px; animation: fadeIn 1s;">
                            <p style="color:#FFD700; font-size:0.85rem; font-weight:bold;">🔥 VIRAL BONUS ACTIVE</p>
                            <p style="color:#888; font-size:0.75rem; margin-bottom:10px;">Support this creator further by viewing their channel!</p>
                            <button class="btn" style="display:block; background:#333; color:white; border:1px solid #FFD700;" 
                                onclick="window.open('https://www.youtube.com/results?search_query=${currentPickedVideo.creator}', '_blank')">
                                Visit ${currentPickedVideo.creator}
                            </button>
                        </div>
                    `;
                    document.querySelector('.container').appendChild(bonusArea);
                }
            }
        }, 1000);
    }

    function renderLeaderboard(videos) {
        // Sort by views and show top 10
        const sorted = videos.sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 10);
        let leaderHTML = "";
        sorted.forEach((v, index) => {
            leaderHTML += `<div class="entry"><span><span class="rank">#${index+1}</span> ${v.creator || "Creator"}</span> <span class="count">${v.views || 0} Views</span></div>`;
        });
        document.getElementById('leaderboard-data').innerHTML = leaderHTML || "No active campaigns.";
    }
</script>
