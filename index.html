<script>
    // ... (Keep your Firebase Config here) ...

    let currentUser = null;
    let timerActive = false;
    let points = 0;
    let dailyCount = 0;
    let currentPickedVideo = null;

    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            document.getElementById('login-section').style.display = "none";
            
            const today = new Date().toISOString().split('T')[0];
            db.ref('users/' + user.uid).on('value', (snap) => {
                const data = snap.val() || {};
                points = data.points || 0;
                dailyCount = (data.daily_stats && data.daily_stats[today]) ? data.daily_stats[today] : 0;
                
                document.getElementById('user-greet').innerText = 
                    `Shalom, ${user.displayName} | Energy: ${points}pts | Today: ${dailyCount}/10`;
                
                checkUploadEligibility();
            });
            loadVideoTask();
        }
    });

    function checkUploadEligibility() {
        const submitBtn = document.getElementById('submitBtn');
        // Now requires 20pts AND at least 2 supports today to unlock
        if (points >= 20 && dailyCount >= 2) { 
            submitBtn.style.display = "block";
            submitBtn.disabled = false;
            submitBtn.style.opacity = "1";
        } else {
            submitBtn.style.display = "block";
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.5";
            submitBtn.innerText = `Need 20pts & 2 daily supports (${dailyCount}/2)`;
        }
    }

    async function loadVideoTask() {
        if (dailyCount >= 10) { // Updated to 10
            document.getElementById('video-area').innerHTML = "<h3>Daily Limit Reached!</h3><p>You've helped 10 leaders today. Great job! Come back tomorrow.</p>";
            return;
        }

        const userRef = db.ref('user_activity/' + currentUser.uid);
        const userHistorySnap = await userRef.once('value');
        const userHistory = userHistorySnap.val() || {};

        db.ref('videos').once('value').then((snapshot) => {
            let videos = [];
            snapshot.forEach(child => { 
                if (!userHistory[child.key]) videos.push({ key: child.key, ...child.val() }); 
            });

            if (videos.length > 0) {
                currentPickedVideo = videos[Math.floor(Math.random() * videos.length)];
                document.getElementById('task-section').style.display = "block";
                document.getElementById('video-area').innerHTML = `
                    <iframe src="https://www.youtube.com/embed/${currentPickedVideo.id}?rel=0" allowfullscreen></iframe>
                    <button class="btn" style="background:#cc0000; color:white;" 
                        onclick="verifyAndStart('${currentPickedVideo.id}', '${currentPickedVideo.key}')">
                        STEP 1: SUB & COMMENT (+5pts)
                    </button>
                `;
            }
        });
    }

    function verifyAndStart(videoId, videoKey) {
        window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
        if (!timerActive) {
            timerActive = true;
            let time = 120;
            const tDiv = document.getElementById('timer');
            tDiv.style.display = "block";
            const interval = setInterval(() => {
                if (timerActive) {
                    time--;
                    tDiv.innerText = time + "s";
                    if (time <= 0) {
                        clearInterval(interval);
                        timerActive = false;
                        completeTask(videoKey);
                    }
                }
            }, 1000);
        }
    }

    function completeTask(videoKey) {
        const today = new Date().toISOString().split('T')[0];
        // 1. Give 5pts for the initial watch
        db.ref('users/' + currentUser.uid + '/points').transaction(p => (p || 0) + 5);
        db.ref('users/' + currentUser.uid + '/daily_stats/' + today).transaction(c => (c || 0) + 1);
        db.ref('user_activity/' + currentUser.uid + '/' + videoKey).set(true);
        
        document.getElementById('timer').style.display = "none";
        
        // 2. Force the Binge Bonus for the remaining 15pts
        document.getElementById('video-area').innerHTML = `
            <div style="background:#111; padding:20px; border-radius:10px; border:1px solid #FFD700;">
                <h3 style="color:#FFD700;">🔥 STEP 1 DONE!</h3>
                <p>Visit the channel and interact with one more video to claim your <b>+15pts Bonus</b>!</p>
                <button class="btn" onclick="claimBonus()">STEP 2: GO TO CHANNEL (+15pts)</button>
            </div>
        `;
    }

    function claimBonus() {
        db.ref('users/' + currentUser.uid + '/points').transaction(p => (p || 0) + 15);
        window.open(`https://www.youtube.com/results?search_query=${currentPickedVideo.creator}`, '_blank');
        alert("Bonus Points Claimed! Loading next mission...");
        location.reload();
    }
</script>
