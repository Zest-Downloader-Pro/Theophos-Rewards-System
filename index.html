<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theophos Rewards System | Leaderboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 20px; border: 2px solid #FFD700; }
        iframe { width: 100%; height: 250px; border-radius: 12px; }
        #timer { font-size: 2rem; color: #FFD700; margin: 15px 0; font-weight: bold; }
        .btn { background: #FFD700; color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; display: none; cursor: pointer; }
        
        /* Leaderboard Style */
        .leaderboard { margin-top: 30px; text-align: left; background: #252525; padding: 15px; border-radius: 12px; }
        .leaderboard h3 { color: #FFD700; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .entry { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .rank { color: #FFD700; font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Theophos Creator Hub</h2>
    <div id="video-area">Finding video...</div>
    <div id="timer">120s</div>
    <button id="submitBtn" class="btn" onclick="location.href='submit.html'">UNLOCK SUBMISSION</button>

    <div class="leaderboard">
        <h3>Top Supporters 🏆</h3>
        <div id="leaderboard-data">Loading rankings...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDphx9VNL7zycGOofDyDyY688pggYl4mns",
      authDomain: "theophos-rewards-system.firebaseapp.com",
      databaseURL: "https://theophos-rewards-system-default-rtdb.firebaseio.com",
      projectId: "theophos-rewards-system",
      storageBucket: "theophos-rewards-system.firebasestorage.app",
      appId: "1:669378222:web:4a295fab14a09ff3662f3f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Fetch Videos & Setup Viewer
    db.ref('videos').once('value').then((snapshot) => {
        let videos = [];
        snapshot.forEach(child => { 
            videos.push({ key: child.key, ...child.val() }); 
        });

        // Simple Randomizer
        if (videos.length > 0) {
            const picked = videos[Math.floor(Math.random() * videos.length)];
            document.getElementById('video-area').innerHTML = `<iframe src="https://www.youtube.com/embed/${picked.id}?autoplay=1" allow="autoplay"></iframe>`;
            startTimer(picked.key);
        } else {
            document.getElementById('video-area').innerHTML = "<p>No videos available. Be the first to submit!</p>";
            document.getElementById('submitBtn').style.display = "block";
            document.getElementById('timer').style.display = "none";
        }

        // 2. Generate Leaderboard
        const sorted = videos.sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 5);
        let leaderHTML = "";
        sorted.forEach((v, index) => {
            leaderHTML += `<div class="entry"><span><span class="rank">#${index+1}</span> ${v.creator || 'Unknown'}</span> <span>${v.views || 0} Views</span></div>`;
        });
        document.getElementById('leaderboard-data').innerHTML = leaderHTML || "No data yet.";
    });

    function startTimer(videoKey) {
        let time = 120;
        const timerDiv = document.getElementById('timer');
        const btn = document.getElementById('submitBtn');

        const interval = setInterval(() => {
            time--;
            timerDiv.innerText = time + "s";
            if (time <= 0) {
                clearInterval(interval);
                timerDiv.style.display = "none";
                btn.style.display = "block";

                // 3. Increment View Counter in Database
                db.ref('videos/' + videoKey + '/views').transaction((currentViews) => {
                    return (currentViews || 0) + 1;
                });
            }
        }, 1000);
    }
</script>
</body>
</html>
