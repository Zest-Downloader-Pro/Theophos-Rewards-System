<script>
    // ... (Keep your Firebase Config here) ...

    const db = firebase.database();
    const auth = firebase.auth();
    let userPts = 0;

    auth.onAuthStateChanged((user) => {
        if (user) {
            db.ref('users/' + user.uid + '/points').on('value', (snap) => {
                userPts = snap.val() || 0;
                document.getElementById('energy-val').innerText = `Your Energy: ${userPts}pts`;
                // Button only activates if they have 20pts
                if (userPts >= 20) document.getElementById('subBtn').disabled = false;
            });
        }
    });

    function processPayment() {
        const url = document.getElementById('vUrl').value;
        const name = document.getElementById('cName').value;
        const vidId = url.match(/(?:v=|\/|be\/)([\w\-\_]{11})/);

        if (vidId && name && userPts >= 20) {
            // Deduct 20 points
            db.ref('users/' + auth.currentUser.uid + '/points').set(userPts - 20);
            
            // Add to the public pool
            db.ref('videos').push({
                id: vidId[1],
                creator: name,
                timestamp: Date.now()
            }).then(() => {
                alert("Success! 20pts deducted. Your video is now in rotation.");
                window.location.href = "index.html";
            });
        }
    }
</script>
