<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Link | Theophos Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #FFD700; max-width: 400px; margin: auto; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        h2 { color: #FFD700; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #222; border: 1px solid #444; color: #fff; outline: none; }
        input:focus { border-color: #FFD700; }
        .energy-box { color: #FFD700; font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; background: #222; padding: 10px; border-radius: 8px; display: inline-block; }
        .btn { background: #FFD700; color: #000; padding: 15px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:disabled { background: #555; cursor: not-allowed; opacity: 0.5; }
        .back-link { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Add Your Link</h2>
    <div id="energy-val" class="energy-box">Checking Energy...</div>
    
    <input type="text" id="cName" placeholder="Channel Name (e.g. Elijah TV)">
    <input type="text" id="vUrl" placeholder="Paste YouTube Video Link">
    
    <button id="subBtn" class="btn" onclick="processPayment()" disabled>PAY 20pts & GO LIVE</button>
    
    <p style="font-size: 0.75rem; color: #777; margin-top: 15px;">Requirement: 20 Energy Points per link.</p>
    <a href="index.html" class="back-link">← Back to Tasks</a>
</div>

<script>
    // --- CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyDphx9VNL7zycGOofDyDyY688pggYl4mns",
      authDomain: "theophos-rewards-system.firebaseapp.com",
      databaseURL: "https://theophos-rewards-system-default-rtdb.firebaseio.com",
      projectId: "theophos-rewards-system",
      appId: "1:669378222:web:4a295fab14a09ff3662f3f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    let userPts = 0;

    // --- CHECK POINTS ON LOAD ---
    auth.onAuthStateChanged((user) => {
        if (user) {
            db.ref('users/' + user.uid + '/points').on('value', (snap) => {
                userPts = snap.val() || 0;
                const energyDisplay = document.getElementById('energy-val');
                const subBtn = document.getElementById('subBtn');
                
                if(energyDisplay) energyDisplay.innerText = `Your Energy: ${userPts}pts`;
                
                // Unlock button only if they have 20 points
                if (userPts >= 20 && subBtn) {
                    subBtn.disabled = false;
                    subBtn.innerText = "PAY 20pts & GO LIVE";
                } else if (subBtn) {
                    subBtn.disabled = true;
                    subBtn.innerText = `Need ${20 - userPts} more pts`;
                }
            });
        } else {
            window.location.href = "index.html";
        }
    });

    // --- PROCESS PAYMENT AND UPLOAD ---
    function processPayment() {
        const url = document.getElementById('vUrl').value;
        const name = document.getElementById('cName').value;
        
        // Improved Video ID Regex for Shorts and Standard links
        const vidIdMatch = url.match(/(?:v=|\/|be\/|shorts\/)([\w\-\_]{11})/);

        if (vidIdMatch && name && userPts >= 20) {
            const videoId = vidIdMatch[1];
            
            // 1. Deduct 20 points from the user
            db.ref('users/' + auth.currentUser.uid + '/points').set(userPts - 20)
            .then(() => {
                // 2. Add the video to the public rotation pool
                return db.ref('videos').push({
                    id: videoId,
                    creator: name,
                    uploaderId: auth.currentUser.uid,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            })
            .then(() => {
                alert("Success! 20pts deducted. Your video is now in the rotation.");
                window.location.href = "index.html";
            })
            .catch((error) => {
                alert("Transaction failed: " + error.message);
            });
        } else {
            alert("Error: Please check the link or ensure you have 20 points.");
        }
    }
</script>

</body>
</html>
