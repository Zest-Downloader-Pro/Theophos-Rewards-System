<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify & Submit | Theophos</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 2px solid #FFD700; max-width: 400px; margin: auto; }
        input[type="text"] { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: white; }
        .check-item { margin: 10px 0; display: flex; align-items: center; font-size: 0.9rem; }
        input[type="checkbox"] { margin-right: 10px; accent-color: #FFD700; }
        button { background: #FFD700; color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; opacity: 0.5; }
        button.active { opacity: 1; }
        h2 { color: #FFD700; }
    </style>
</head>
<body>
<div class="box">
    <h2>Verify Support</h2>
    <p>A leader is honest. Confirm your actions:</p>
    <div class="check-group">
        <div class="check-item"><input type="checkbox" id="c1" onchange="validate()"> I Liked & Subscribed</div>
    </div>
    <input type="text" id="channelName" placeholder="Your Channel Name">
    <input type="text" id="videoUrl" placeholder="Paste YOUR Video Link">
    <button id="mainBtn" onclick="uploadLink()" disabled>ADD MY VIDEO</button>
</div>
<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDphx9VNL7zycGOofDyDyY688pggYl4mns",
      authDomain: "theophos-rewards-system.firebaseapp.com",
      databaseURL: "https://theophos-rewards-system-default-rtdb.firebaseio.com",
      projectId: "theophos-rewards-system",
      appId: "1:669378222:web:4a295fab14a09ff3662f3f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    function validate() {
        const isReady = document.getElementById('c1').checked;
        const btn = document.getElementById('mainBtn');
        btn.disabled = !isReady;
        btn.className = isReady ? 'active' : '';
    }
    function uploadLink() {
        const url = document.getElementById('videoUrl').value;
        const name = document.getElementById('channelName').value;
        const videoIdMatch = url.match(/(?:https?:\/{2})?(?:w{3}\.)?youtu(?:be)?\.(?:com|be)(?:\/watch\?v=|\/)([^\s&]+)/);
        if (videoIdMatch && videoIdMatch[1] && name) {
            db.ref('videos').push({
                id: videoIdMatch[1],
                creator: name,
                views: 0,
                timestamp: Date.now()
            }).then(() => {
                alert("Success! Your video is in the rotation.");
                window.location.href = "index.html"; 
            });
        } else {
            alert("Please provide your Name and a valid YouTube Link!");
        }
    }
</script>
</body>
</html>
